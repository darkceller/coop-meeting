<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編輯委員會-雲端議事廳</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --coop-green: #2d5a27; /* 合作社風格綠色 */
            --coop-orange: #f39c12;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            font-size: 20px;
        }
        .header {
            background-color: var(--coop-green);
            color: white;
            padding: 20px 10px;
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 5px solid var(--coop-orange);
        }
        .btn-custom {
            padding: 25px 20px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 15px;
            margin-bottom: 20px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-decoration: none;
            border: none;
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn-custom:active {
            transform: scale(0.96); /* 點擊時縮小的動態感 */
        }
        .btn-custom:hover {
            opacity: 0.9;
            color: white !important;
        }

        /* 顏色定義 */
        .btn-primary-custom { background-color: #0056b3; color: white !important; } /* 藍色 */
        .btn-purple-custom { background-color: #6f42c1; color: white !important; }  /* 紫色 */
        .btn-success-custom { background-color: #28a745; color: white !important; } /* 綠色 */
        .btn-info-custom { background-color: #17a2b8; color: white !important; }    /* 青藍色 */

        .icon { margin-right: 15px; font-size: 30px; }
        
        .footer {
            text-align: center;
            font-size: 16px;
            color: #777;
            margin-top: 30px;
            padding: 20px;
        }
        p { line-height: 1.6; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 28px; margin-bottom: 5px;">主婦聯盟編輯委員會</h1>
        <p style="font-size: 20px; margin-bottom: 0;">🍀 雲端議事廳 🍀</p>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-12">
                <a href="#" id="btn-agenda" target="_blank" class="btn-custom btn-primary-custom">
                    <span class="icon">📅</span> 1. 查看今日議程
                </a>

                <a href="https://forms.gle/dKiBD9BbmSLuinjz8" target="_blank" class="btn-custom btn-purple-custom">
                    <span class="icon">📝</span> 2. 提交提案 / 上傳附件
                </a>
                
                <a href="#" id="btn-vote" target="_blank" class="btn-custom btn-success-custom">
                    <span class="icon">🎥</span> 3. 進入線上會議 (Meet)
                </a>

                <a href="#" id="btn-archive" target="_blank" class="btn-custom btn-info-custom">
                    <span class="icon">📚</span> 4. 歷次紀錄查詢
                </a>
            </div>
        </div>

        <div class="card mt-4" style="border-left: 10px solid var(--coop-orange);">
            <div class="card-body">
                <h5 class="card-title" style="font-weight: bold; color: var(--coop-green);">💡 小提醒</h5>
                <p class="card-text">
                    點擊上方按鈕即可進入相關頁面。若畫面沒有反應，請確認您的網路連線是否正常。
                </p>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>編輯委員會 數位轉型實驗小組<br>如有使用問題，請寄信至 dark.celler@gmail.com 反應</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjEF6OeIFMUxmbtdQDyJ9Mn-pdPqAgH_MlbFo6mR_qX-jz3Zs0Fmywbnfr0USK0L_YyU7h-k5PxlsX/pub?output=csv";

    async function updateLinks() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            const rows = data.split(/\r?\n/).map(row => row.split(','));
            const validRows = rows.filter(row => row[0] && row[0].trim() !== "");
            const lastRow = validRows[validRows.length - 1];

            if (lastRow) {
                // 連結順序應對試算表：0日期, 1議程, 2Meet, 3檔案
                const agendaUrl = lastRow[1]?.trim();
                const voteUrl = lastRow[2]?.trim();
                const archiveUrl = lastRow[3]?.trim();

                if (agendaUrl) document.getElementById('btn-agenda').href = agendaUrl;
                if (voteUrl) document.getElementById('btn-vote').href = voteUrl;
                if (archiveUrl) document.getElementById('btn-archive').href = archiveUrl;
                
                console.log("連線同步成功，日期：" + lastRow[0]);
            }
        } catch (error) {
            console.error("資料抓取失敗", error);
        }
    }
    updateLinks();
    </script>
</body>
</html>
