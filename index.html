<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編輯委員會-雲端議事廳</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --coop-green: #2d5a27; /* 合作社風格綠色 */
            --coop-orange: #f39c12;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            font-size: 20px; /* 全域字體放大 */
        }
        .header {
            background-color: var(--coop-green);
            color: white;
            padding: 20px 10px;
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 5px solid var(--coop-orange);
        }
        .btn-custom {
            padding: 25px 20px;
            font-size: 24px; /* 按鈕字體更大 */
            font-weight: bold;
            border-radius: 15px;
            margin-bottom: 20px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-decoration: none;
            border: none;
        }
        .btn-primary-custom { background-color: #0056b3; color: white; }
        .btn-success-custom { background-color: #28a745; color: white; }
        .btn-info-custom { background-color: #17a2b8; color: white; }
        
        .icon { margin-right: 15px; font-size: 30px; }
        .footer {
            text-align: center;
            font-size: 16px;
            color: #777;
            margin-top: 30px;
            padding: 20px;
        }
        /* 針對長輩閱讀：增加行高與段落間距 */
        p { line-height: 1.6; margin-bottom: 1.5rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 28px; margin-bottom: 5px;">主婦聯盟編輯委員會</h1>
        <p style="font-size: 20px; margin-bottom: 0;">🍀 雲端議事廳 🍀</p>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-12">
<a href="#" id="btn-agenda" class="btn-custom btn-primary-custom">
    <span class="icon">📅</span> 1. 查看今日議程
</a>

<a href="#" id="btn-vote" class="btn-custom btn-success-custom">
    <span class="icon">✍️</span> 2. 點我簽到 / 投票
</a>

<a href="#" id="btn-archive" class="btn-custom btn-info-custom">
    <span class="icon">📚</span> 3. 歷次紀錄查詢
</a>
            </div>
        </div>

        <div class="card mt-4" style="border-left: 10px solid var(--coop-orange);">
            <div class="card-body">
                <h5 class="card-title" style="font-weight: bold; color: var(--coop-green);">💡 小提醒</h5>
                <p class="card-text">
                    點擊上方按鈕即可進入相關頁面。若手機字體太小，請點擊螢幕右上角「三個點」選擇「在瀏覽器開啟」。
                </p>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>編輯委員會 數位轉型實驗版<br>如有使用問題，請於 LINE 群組反應</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // 1. 貼上你從 Google Sheets 「發布到網路」取得的 CSV 網址
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjEF6OeIFMUxmbtdQDyJ9Mn-pdPqAgH_MlbFo6mR_qX-jz3Zs0Fmywbnfr0USK0L_YyU7h-k5PxlsX/pub?output=csv";

    async function updateLinks() {
        try {
            const response = await fetch(csvUrl);
            const data = await response.text();
            
            // 2. 解析 CSV (簡單切割法)
            const rows = data.split('\n').map(row => row.split(','));
            
            // 3. 取得最後一列非空白資料 (排除 CSV 可能末尾有的換行)
            const lastRow = rows.filter(row => row[0] && row[0].trim() !== "").pop();

            if (lastRow) {
                // 假設欄位順序：0:日期, 1:議程, 2:投票, 3:檔案
                const agendaUrl = lastRow[1].trim();
                const voteUrl = lastRow[2].dist().trim();
                const archiveUrl = lastRow[3].trim();

                // 4. 自動更新網頁上的按鈕 href
                // 請確保你的 HTML 按鈕有對應的 ID
                if (agendaUrl) document.getElementById('btn-agenda').href = agendaUrl;
                if (voteUrl) document.getElementById('btn-vote').href = voteUrl;
                if (archiveUrl) document.getElementById('btn-archive').href = archiveUrl;
                
                console.log("連結更新成功！最新的日期是：" + lastRow[0]);
            }
        } catch (error) {
            console.error("抓取資料失敗：", error);
        }
    }

    // 網頁開啟時執行
    updateLinks();
</script>
</body>

</html>
