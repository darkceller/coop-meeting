<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCGN-COOP 雲端議事廳</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --coop-green: #2d5a27;
            --coop-orange: #f39c12;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            font-size: 20px;
        }
        .header {
            background-color: var(--coop-green);
            color: white;
            padding: 20px 10px;
            text-align: center;
            border-bottom: 5px solid var(--coop-orange);
            margin-bottom: 0;
        }
        .committee-selector-bg {
            background-color: #e9ecef;
            padding: 15px 0;
            margin-bottom: 25px;
            border-bottom: 1px solid #dee2e6;
        }
        .btn-custom {
            padding: 25px 20px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 15px;
            margin-bottom: 20px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-decoration: none !important;
            border: none;
            transition: transform 0.1s;
        }
        .btn-custom:active {
            transform: scale(0.96);
        }
        /* 按鈕顏色 */
        .btn-primary-custom { background-color: #0056b3; color: white !important; }
        .btn-purple-custom { background-color: #6f42c1; color: white !important; }
        .btn-success-custom { background-color: #28a745; color: white !important; }
        .btn-info-custom { background-color: #17a2b8; color: white !important; }
        
        .icon { margin-right: 15px; font-size: 30px; }
        .footer {
            text-align: center;
            font-size: 16px;
            color: #777;
            margin-top: 30px;
            padding: 20px;
        }
        .form-select-lg {
            border: 2px solid var(--coop-green);
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 28px; margin-bottom: 5px;">HCGN-COOP 雲端議事入口</h1>
        <p style="font-size: 18px; margin-bottom: 0;">🍀 全分社委員會通用版 🍀</p>
    </div>

    <div class="committee-selector-bg">
        <div class="container">
            <label for="committee-select" class="form-label mb-2" style="font-weight: bold; color: var(--coop-green);">請選擇所屬委員會：</label>
            <select id="committee-select" class="form-select form-select-lg" onchange="changeCommittee()">
                <option value="editor">🍀 編輯委員會</option>
                <option value="education">🎓 教育委員會</option>
                <option value="welfare">❤️ 福祉委員會</option>
                <option value="goods">🛒 生活材委員會</option>
            </select>
        </div>
    </div>

    <div class="container">
        <div class="row">
            <div class="col-12">
                <a href="#" id="btn-agenda" target="_blank" class="btn-custom btn-primary-custom">
                    <span class="icon">📅</span> 1. 查看今日議程
                </a>

                <a href="https://forms.gle/dKiBD9BbmSLuinjz8" target="_blank" class="btn-custom btn-purple-custom">
                    <span class="icon">📝</span> 2. 提交提案 / 上傳附件
                </a>
                
                <a href="#" id="btn-meet" target="_blank" class="btn-custom btn-success-custom">
                    <span class="icon">🎥</span> 3. 進入線上會議 (Meet)
                </a>

                <a href="#" id="btn-archive" target="_blank" class="btn-custom btn-info-custom">
                    <span class="icon">📚</span> 4. 歷次紀錄查詢
                </a>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>HCGN-COOP 數位轉型實驗小組<br>如有使用問題，請於 LINE 群組反應</p>
    </div>

    <script>
        // --- 設定區：請填入各委員會分頁發布後的 CSV 網址 ---
        const csvUrls = {
            'editor': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRjEF6OeIFMUxmbtdQDyJ9Mn-pdPqAgH_MlbFo6mR_qX-jz3Zs0Fmywbnfr0USK0L_YyU7h-k5PxlsX/pub?output=csv', 
            'education': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRjEF6OeIFMUxmbtdQDyJ9Mn-pdPqAgH_MlbFo6mR_qX-jz3Zs0Fmywbnfr0USK0L_YyU7h-k5PxlsX/pub?output=csv',
            'welfare': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRjEF6OeIFMUxmbtdQDyJ9Mn-pdPqAgH_MlbFo6mR_qX-jz3Zs0Fmywbnfr0USK0L_YyU7h-k5PxlsX/pub?output=csv',
            'goods': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRjEF6OeIFMUxmbtdQDyJ9Mn-pdPqAgH_MlbFo6mR_qX-jz3Zs0Fmywbnfr0USK0L_YyU7h-k5PxlsX/pub?output=csv'
        };

        // 頁面載入時
        window.onload = function() {
            // 讀取上次選擇的紀錄
            const savedCommittee = localStorage.getItem('hcgn_selected_committee');
            if (savedCommittee && csvUrls[savedCommittee]) {
                document.getElementById('committee-select').value = savedCommittee;
            }
            updateLinks();
        };

        // 當切換委員會選單時
        async function changeCommittee() {
            const selected = document.getElementById('committee-select').value;
            localStorage.setItem('hcgn_selected_committee', selected); // 儲存選擇
            await updateLinks();
        }

        async function updateLinks() {
            const committee = document.getElementById('committee-select').value;
            const url = csvUrls[committee];
            
            // 檢查是否已設定連結
            if (!url || url.includes('你的')) {
                console.log(committee + " 尚未設定 CSV 連結");
                // 連結尚未設定時的重設
                document.getElementById('btn-agenda').href = "#";
                document.getElementById('btn-meet').href = "#";
                document.getElementById('btn-archive').href = "#";
                return;
            }

            try {
                const response = await fetch(url);
                const data = await response.text();
                const rows = data.split(/\r?\n/).map(row => row.split(','));
                
                // 過濾掉空行，抓取最後一筆資料
                const validRows = rows.filter(row => row[0] && row[0].trim() !== "");
                const lastRow = validRows[validRows.length - 1];

                if (lastRow) {
                    const agendaUrl = lastRow[1]?.trim();
                    const meetUrl = lastRow[2]?.trim();
                    const archiveUrl = lastRow[3]?.trim();

                    document.getElementById('btn-agenda').href = agendaUrl || "#";
                    document.getElementById('btn-meet').href = meetUrl || "#";
                    document.getElementById('btn-archive').href = archiveUrl || "#";
                    
                    console.log("已切換至：" + committee + "，最新資料日期：" + lastRow[0]);
                }
            } catch (error) {
                console.error("資料更新失敗:", error);
            }
        }
    </script>
</body>
</html>
