<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCGN-COOP 雲端議事入口</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --coop-green: #2d5a27;
            --coop-orange: #f39c12;
            --coop-light-gray: #f4f7f6;
        }
        body {
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--coop-light-gray);
            color: #333;
            margin: 0;
            padding: 0;
        }

        /* 1. Logo 與 Header 區域 (Logo 已放大) */
        .header-section {
            background-color: var(--coop-green);
            color: white;
            padding: 40px 15px 60px 15px;
            text-align: center;
            border-bottom: 6px solid var(--coop-orange);
        }
        .logo-img {
            /* 調整：將 Logo 放大到大約 350px 寬度，並保持比例，使其接近標題寬度 */
            width: 350px; 
            max-width: 90%; /* 確保在小螢幕上不會溢出 */
            height: auto;
            margin-bottom: 20px;
        }
        .header-section h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: 1px;
            display: inline-block; /* 讓容器貼合文字 */
        }
        .header-section p {
            font-size: 16px;
            opacity: 0.9;
            margin-bottom: 0;
        }

        /* 視覺層次感：主容器上浮 */
        .main-content {
            margin-top: -35px;
            padding-bottom: 40px;
        }
        .content-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 25px;
            margin-bottom: 25px;
        }

        /* 委員會選擇區優化 */
        .selector-label {
            font-weight: bold;
            color: var(--coop-green);
            margin-bottom: 12px;
            display: block;
            font-size: 18px;
        }
        .form-select-lg {
            border: 2px solid #ddd;
            border-top-right-radius: 0;
            border-bottom-right-radius: 0;
